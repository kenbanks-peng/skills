<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root { --bg:#f7f5f0; --surface:#fff; --ink:#1f2937; --muted:#6b7280; --line:#d8d2c5; --accent:#8b5cf6; --radius:16px; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
    header, main, footer { width:min(1120px, calc(100% - 32px)); margin-inline:auto; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:24px; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    @media (max-width:760px) { .grid { grid-template-columns:1fr !important; } }
    @media print { .no-print { display:none !important; } body { background:#fff; } .card { break-inside:avoid; box-shadow:none; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
  </style>
</head>
<body>
  <header><h1>{{title}}</h1><p>{{purpose}}</p></header>
  <main>{{content}}</main>
  <footer>Generated from provided sources.</footer>
</body>
</html>
